<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Libro</title>
</head>
<body>
    <h2>Crear Nuevo Libro</h2>
    <form action="/create" method="POST">

    </form>
</body>
